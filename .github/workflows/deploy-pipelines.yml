name: Deploy Ad Pipelines

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'meta-api/**'
      - 'bing-ads/**'
      - 'gads_backfill/**'

jobs:
  deploy-meta:
    name: Deploy Meta Gallery Pipeline
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(toJSON(github.event.head_commit.modified), '"meta-api/')
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Functions
        run: |
          gcloud functions deploy meta-creatives-gallery \
            --gen2 \
            --runtime=python311 \
            --entry-point=run_meta_creatives_gallery_pipeline \
            --source=meta-api \
            --project=looker-studio-pro-msanford \
            --region=us-central1 \
            --trigger-http \
            --allow-unauthenticated \
            --memory=512Mi \
            --service-account=cloud-run-deployer@looker-studio-pro-msanford.iam.gserviceaccount.com

  deploy-bing:
    name: Deploy Bing Gallery Pipeline
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(toJSON(github.event.head_commit.modified), '"bing-ads/')
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Functions
        run: |
          gcloud functions deploy bing-creatives-gallery \
            --gen2 \
            --runtime=python311 \
            --entry-point=run_bing_creatives_gallery_pipeline \
            --source=bing-ads \
            --project=looker-studio-pro-msanford \
            --region=us-central1 \
            --trigger-http \
            --allow-unauthenticated \
            --memory=512Mi \
            --service-account=cloud-run-deployer@looker-studio-pro-msanford.iam.gserviceaccount.com \
            --set-env-vars=GCP_PROJECT=looker-studio-pro-msanford

  deploy-gads:
    name: Deploy Google Ads Gallery Pipeline
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(toJSON(github.event.head_commit.modified), '"gads_backfill/')
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Functions
        run: |
          gcloud functions deploy gads-creatives-gallery \
            --gen2 \
            --runtime=python311 \
            --entry-point=run_creative_gallery_pipeline \
            --source=gads_backfill \
            --project=looker-studio-pro-msanford \
            --region=us-central1 \
            --trigger-http \
            --allow-unauthenticated \
            --memory=512Mi \
            --service-account=cloud-run-deployer@looker-studio-pro-msanford.iam.gserviceaccount.com
